<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>My Discord Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <nav id="sidebar">
            <h3>チャンネル</h3>
            <ul id="channel-list">
                </ul>
        </nav>
        
        <main id="chat-area">
            <header id="channel-header">チャンネルを選択してください</header>
            <div id="messages"></div>
            <div id="input-area">
                <input type="text" id="msg-input" placeholder="メッセージを送信...">
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
